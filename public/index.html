<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Announce — V2 Components</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>

<!-- Sidebar -->
<aside id="sidebar">
  <div class="brand">
    <div class="brand-icon">A</div>
    <div class="brand-name">Announce</div>
    <div class="brand-sub">V2 Components</div>
  </div>
  <nav class="nav">
    <button class="nav-btn active" data-tab="build">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
      Build
    </button>
    <button class="nav-btn" data-tab="general">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      General
    </button>
    <button class="nav-btn" data-tab="settings">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
      Settings
    </button>
  </nav>
  <div class="bot-status" id="botStatus">
    <span class="dot" id="botDot"></span>
    <span id="botLabel">Bot offline</span>
  </div>
</aside>

<!-- Main -->
<div id="main">
  <header class="topbar">
    <h1 id="pageTitle">Build announcement</h1>
    <div class="topbar-actions" id="topbarActions">
      <button class="btn ghost" id="resetBtn">Reset</button>
      <button class="btn primary" id="sendBtn">Send</button>
    </div>
  </header>

  <!-- BUILD PAGE -->
  <section class="page active" id="buildPanel">

    <!-- Form -->
    <div class="form-panel">

      <div class="field">
        <label class="field-label">Channel</label>
        <select id="channelId">
          <option value="">Select a channel…</option>
        </select>
        <small>Load channels from Settings after saving your token and server ID.</small>
      </div>

      <div class="field">
        <label class="check-row">
          <input type="checkbox" id="pingEveryone" checked />
          Ping @everyone above the announcement
        </label>
      </div>

      <div class="field">
        <label class="field-label">Product</label>
        <input type="text" id="product" placeholder="e.g. Void External" />
      </div>

      <div class="field">
        <label class="field-label">Status</label>
        <div class="sdot-wrap">
          <span class="sdot" id="sdot" style="background:#57f287"></span>
          <select id="status">
            <option value="UNDETECTED" data-c="#57f287">Updated</option>
            <option value="DETECTED"   data-c="#ed4245">Detected</option>
            <option value="UPDATING"   data-c="#faa61a">Updating</option>
            <option value="MAINTENANCE" data-c="#faa61a">Maintenance</option>
          </select>
        </div>
      </div>

      <div class="field" style="display:none">
        <label class="field-label">Live status URL</label>
        <input type="url" id="statusUrl" value="https://odservices.cc/status" />
      </div>

      <div class="field">
        <label class="field-label">Changelog</label>
        <textarea id="changelog" rows="7" placeholder="- Added feature&#10;- Fixed bug"></textarea>
      </div>

      <div class="field">
        <label class="field-label">Banner image URL</label>
        <input type="url" id="imageUrl" placeholder="https://cdn.discordapp.com/..." />
      </div>

      <div class="row2">
        <div class="field">
          <label class="field-label">Footer (optional)</label>
          <input type="text" id="footer" placeholder="e.g. OD Services Updates" />
        </div>
        <div class="field" style="align-items:flex-start">
          <label class="field-label">Accent</label>
          <input type="color" id="accentColor" value="#9900ff" />
        </div>
      </div>

    </div>

    <!-- Preview -->
    <div class="preview-wrap">
      <div class="preview-header">
        <span>Live preview</span>
        <span class="badge">V2</span>
      </div>
      <div id="preview"></div>
    </div>

  </section>

  <!-- GENERAL PAGE -->
  <section class="page" id="generalPanel">

    <div class="form-panel">

      <div class="field">
        <label class="field-label">Channel</label>
        <select id="gChannelId">
          <option value="">Select a channel…</option>
        </select>
      </div>

      <div class="field">
        <label class="check-row">
          <input type="checkbox" id="gPingEveryone" checked />
          Ping @everyone above the announcement
        </label>
      </div>

      <div class="field">
        <label class="field-label">Title</label>
        <input type="text" id="gTitle" placeholder="e.g. Important Update" />
      </div>

      <div class="field">
        <label class="field-label">Message</label>
        <textarea id="gMessage" rows="8" placeholder="Write your announcement here…"></textarea>
      </div>

      <div class="field">
        <label class="field-label">Banner image URL</label>
        <input type="url" id="gImageUrl" placeholder="https://cdn.discordapp.com/..." />
      </div>

      <div class="row2">
        <div class="field">
          <label class="field-label">Footer (optional)</label>
          <input type="text" id="gFooter" placeholder="e.g. OD Services Updates" />
        </div>
        <div class="field" style="align-items:flex-start">
          <label class="field-label">Accent</label>
          <input type="color" id="gAccentColor" value="#9900ff" />
        </div>
      </div>

    </div>

    <!-- Preview -->
    <div class="preview-wrap">
      <div class="preview-header">
        <span>Live preview</span>
        <span class="badge">V2</span>
      </div>
      <div id="gPreview"></div>
    </div>

  </section>

  <!-- SETTINGS PAGE -->
  <section class="page" id="settingsPanel">

    <div class="settings-card" id="envCard">
      <h2>Bot connection</h2>
      <p class="hint" id="envHint">Checking connection…</p>
      <div id="tokenFields">
        <div class="field">
          <label class="field-label">Bot token</label>
          <input type="password" id="botToken" placeholder="Paste token to update" autocomplete="off" />
          <small id="tokenHint">No token saved yet.</small>
        </div>
        <div class="field">
          <label class="field-label">Server ID (Guild ID)</label>
          <input type="text" id="guildId" placeholder="Right-click server → Copy Server ID" />
        </div>
      </div>
      <div class="field">
        <label class="field-label">Default channel ID (optional)</label>
        <input type="text" id="defaultChannelId" placeholder="Used when none selected on Build tab" />
      </div>
      <div class="settings-actions">
        <button class="btn primary" id="saveSettingsBtn">Save &amp; connect bot</button>
        <button class="btn ghost" id="loadChannelsBtn">Reload channels</button>
      </div>
    </div>

  </section>

</div>

<div id="toast"></div>
<div id="overlay"><div class="spinner"></div><span style="color:#f2f3f5;font-size:14px">Sending…</span></div>

<script src="/app.js"></script>
</body>
</html>
